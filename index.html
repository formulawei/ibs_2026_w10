<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IBS W10 · Platforms, Pipelines & Ecosystem Competition ｜學生版</title>
<style>
:root{
  --ntu:#002B5C; --ntu2:#01356F; --gold:#C9A227;
  --paper:#F4F7FC; --ink:#0B1220; --muted:#475569;
  --muted2:#64748B; --line:#D7DEE9; --card:#FFFFFF;
  --shadow:0 10px 30px rgba(2,6,23,.10);
  --radius:16px; --radius2:20px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --s0:#065F46; --t1:#4C1D95; --t2:#0F766E; --c1:#B45309; --s1:#1E3A5F; --ai:#991B1B;
  --green:#15803D; --sub:#94A3B8; --surface:#FBFCFE;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--sans);font-size:16px;color:var(--ink);
  background:radial-gradient(1200px 600px at 8% 0%,rgba(0,43,92,.07),transparent 55%),
             radial-gradient(900px 500px at 96% 4%,rgba(201,162,39,.10),transparent 55%),
             var(--paper);}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(244,247,252,.94);backdrop-filter:blur(10px);z-index:20;}
.brand{display:flex;gap:12px;align-items:center;min-width:0;}
.logo{width:50px;height:50px;display:grid;place-items:center;border-radius:14px;
  background:linear-gradient(135deg,var(--ntu),var(--ntu2));color:#fff;
  font-weight:900;letter-spacing:.08em;box-shadow:0 8px 22px rgba(0,43,92,.28);font-size:13px;}
.brandText{min-width:0;}
.course{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.topic{font-size:15px;font-weight:900;color:var(--ntu);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;
  font-weight:700;cursor:pointer;transition:.12s ease;font-size:13px;color:var(--ink);}
.btn:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.btn.gold{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.12);color:#5A4600;}
.btn.primary{background:var(--ntu);color:#fff;border-color:var(--ntu);}
.btn.primary:hover{background:var(--ntu2);}
.btn.ai-btn{background:var(--ai);color:#fff;border-color:var(--ai);font-size:13px;}
.btn.ai-btn:hover{background:#7f1d1d;}
.layout{display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;max-width:1480px;margin:0 auto;}
.sidebar{position:sticky;top:86px;align-self:start;border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.78);backdrop-filter:blur(8px);box-shadow:var(--shadow);padding:14px;
  max-height:calc(100vh - 104px);overflow-y:auto;}
.navTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.navItem{width:100%;text-align:left;padding:9px 11px;border-radius:11px;border:1px solid transparent;
  background:transparent;cursor:pointer;font-weight:700;font-size:13px;color:var(--ntu2);display:block;
  transition:.1s ease;margin-bottom:2px;line-height:1.35;}
.navItem:hover{background:rgba(0,43,92,.06);}
.navItem.active{background:rgba(0,43,92,.10);border-color:rgba(0,43,92,.18);}
.navItem.seg-s0.active{background:rgba(6,95,70,.10);border-color:rgba(6,95,70,.25);color:var(--s0);}
.navItem.seg-t1.active{background:rgba(76,29,149,.10);border-color:rgba(76,29,149,.25);color:var(--t1);}
.navItem.seg-t2.active{background:rgba(15,118,110,.10);border-color:rgba(15,118,110,.25);color:var(--t2);}
.navItem.seg-c1.active{background:rgba(180,83,9,.10);border-color:rgba(180,83,9,.25);color:var(--c1);}
.navItem.seg-s1.active{background:rgba(30,58,95,.10);border-color:rgba(30,58,95,.25);color:var(--s1);}
.navFooter{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.kbd{font-family:var(--mono);font-weight:900;padding:2px 6px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--muted);font-size:10px;}
.content{border:1px solid var(--line);border-radius:var(--radius2);background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);box-shadow:var(--shadow);padding:24px;min-height:calc(100vh - 160px);}
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:20px;}
.h1{font-size:27px;font-weight:900;color:var(--ntu);margin:0;line-height:1.18;}
.sub{margin:6px 0 0;color:var(--muted);line-height:1.5;font-size:15px;}
.tag{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(0,43,92,.25);
  background:rgba(0,43,92,.08);color:var(--ntu);padding:8px 14px;border-radius:999px;font-weight:800;white-space:nowrap;font-size:13px;}
.timeTracker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.timePill{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);}
.timePill.s0{background:var(--s0);color:#fff;border-color:var(--s0);}
.timePill.t1{background:var(--t1);color:#fff;border-color:var(--t1);}
.timePill.t2{background:var(--t2);color:#fff;border-color:var(--t2);}
.timePill.c1{background:var(--c1);color:#fff;border-color:var(--c1);}
.timePill.s1{background:var(--s1);color:#fff;border-color:var(--s1);}
.timePill.cur{opacity:1!important;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.card{border:1px solid var(--line);border-radius:var(--radius);background:var(--card);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cardTitle{font-weight:900;color:var(--ntu);margin:0 0 10px;font-size:15px;}
.p{margin:0;color:var(--ink);line-height:1.65;font-size:15px;}
.ul{margin:8px 0 0 20px;color:var(--ink);line-height:1.65;font-size:15px;}
.ul li{margin-bottom:5px;}
.sm{font-size:13px;color:var(--muted);}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0;}
.callout{border-left:5px solid var(--ntu);padding:12px 14px;background:rgba(0,43,92,.05);border-radius:12px;margin:10px 0;line-height:1.6;}
.callout.gold{border-color:var(--gold);background:rgba(201,162,39,.08);}
.callout.green{border-color:#15803d;background:rgba(21,128,61,.06);}
.callout.purple{border-color:#7C3AED;background:rgba(124,58,237,.06);}
.callout.red{border-color:#DC2626;background:rgba(220,38,38,.05);}
.callout.teal{border-color:#0E7490;background:rgba(14,116,144,.06);}
.callout.teacher{border-color:#D97706;background:rgba(217,119,6,.07);border-style:dashed;}
.callout strong{color:var(--ntu);}
.callout.gold strong{color:#7C5500;}
.callout.green strong{color:#14532D;}
.callout.purple strong{color:#5B21B6;}
.callout.red strong{color:#991B1B;}
.callout.teal strong{color:#164E63;}
.callout.teacher strong{color:#92400E;}
.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 11px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.dot.b{background:var(--ntu);} .dot.g{background:#15803d;} .dot.p{background:#7C3AED;} .dot.r{background:#DC2626;} .dot.t{background:#0E7490;}
.qBox{border:1.5px dashed rgba(0,43,92,.28);background:rgba(0,43,92,.03);border-radius:14px;padding:14px;}
.qTitle{font-weight:900;margin:0 0 10px;color:var(--ntu);font-size:15px;}
.options{display:grid;gap:8px;}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:700;text-align:left;transition:.1s ease;font-size:14px;color:var(--ink);}
.opt:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.07);}
.opt.chosen{border-color:rgba(0,43,92,.50);background:rgba(0,43,92,.06);}
.opt.correct{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.opt[disabled]{cursor:default;}
.barWrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bar{height:11px;border-radius:999px;background:rgba(0,0,0,.06);overflow:hidden;flex:1;border:1px solid var(--line);}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--ntu));transition:width .4s ease;}
.smallVote{color:var(--muted);font-size:12px;font-family:var(--mono);}
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);}
.tbl th,.tbl td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;line-height:1.5;}
.tbl th{background:rgba(0,43,92,.06);color:var(--ntu);font-weight:800;font-size:12.5px;letter-spacing:.02em;}
.tbl tbody tr:nth-child(even){background:rgba(244,247,252,.55);}
.tbl tbody tr:hover{background:rgba(201,162,39,.06);}
.revealBox{display:none;}
.revealBox.visible{display:block;animation:fadeSlide .3s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
.aiBox{border:2px solid rgba(153,27,27,.3);background:rgba(153,27,27,.03);border-radius:16px;padding:16px;margin:14px 0;}
.aiBoxTitle{font-weight:900;color:var(--ai);font-size:14px;margin:0 0 10px;display:flex;align-items:center;gap:8px;}
.aiOutput{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;min-height:80px;font-size:14px;line-height:1.7;color:var(--ink);margin:10px 0;white-space:pre-wrap;}
.aiOutput.loading{color:var(--muted);font-style:italic;}
.critiqueInput{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;font-family:var(--sans);resize:vertical;min-height:80px;color:var(--ink);}
.critiqueInput:focus{outline:none;border-color:rgba(0,43,92,.4);}
.workflowSteps{background:rgba(15,118,110,.06);border-left:3px solid var(--t2);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:13px;line-height:1.7;}
.workflowSteps strong{color:var(--t2);}
.aiBox-link{display:inline-block;background:#fff;border:1px solid #D1D5DB;border-radius:6px;padding:3px 10px;margin:3px 4px 3px 0;font-size:12px;text-decoration:none;color:var(--ink);font-weight:600;}
.aiBox-link:hover{background:#F3F4F6;border-color:var(--t2);color:var(--t2);}
.promptBox{background:#1F2937;color:#F9FAFB;border-radius:10px;padding:12px 14px;margin:10px 0;}
.promptBox .promptHeader{font-size:12px;color:#9CA3AF;font-weight:700;margin:0 0 8px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.promptBox pre{margin:0;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.6;color:#F9FAFB;max-height:280px;overflow-y:auto;}
.copy-btn{background:#10B981;color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.copy-btn:hover{background:#059669;}
.copy-btn.copied{background:#3B82F6;}
.responseInput{width:100%;border:1.5px solid #94A3B8;border-radius:12px;padding:10px 12px;font-size:13px;font-family:var(--sans);resize:vertical;min-height:90px;background:#F8FAFC;color:var(--ink);}
.responseInput:focus{outline:none;border-color:var(--t2);background:#fff;}
.debateGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;}
.debateCard{border:1px solid var(--line);border-radius:14px;padding:14px;}
.debateCard.a{border-left:4px solid var(--t1);}
.debateCard.b{border-left:4px solid var(--t2);}
.debateLabel{font-weight:900;font-size:13px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.debateCard.a .debateLabel{color:var(--t1);}
.debateCard.b .debateLabel{color:var(--t2);}
.govBar{background:linear-gradient(90deg,#E0F2FE,#DDD6FE,#FEE2E2);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:13px;margin:10px 0;}
.govItem{text-align:center;flex:1;}
.govArrow{color:var(--muted);font-size:18px;}
.teacherBadge{display:inline-block;background:#D97706;color:#fff;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.04em;margin-left:8px;}
.wc{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;margin-top:4px;}
@media(max-width:880px){.layout{grid-template-columns:1fr;}.sidebar{position:static;max-height:none;}.grid2,.grid3{grid-template-columns:1fr;}.debateGrid{grid-template-columns:1fr;}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ntu);color:#fff;padding:10px 20px;border-radius:999px;font-weight:700;font-size:14px;transition:.3s ease;z-index:100;pointer-events:none;opacity:0;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
/* ── Projection / Presenter Mode ── */
.presenter .sidebar{display:none;}
.presenter .layout{grid-template-columns:1fr;padding:14px 20px;}
.presenter .content{font-size:17px;padding:28px 32px;min-height:calc(100vh - 80px);}
.presenter .h1{font-size:32px;}
.presenter .sub{font-size:17px;}
.presenter .p,.presenter .ul{font-size:17px;}
.presenter .cardTitle{font-size:17px;}
.presenter .card{padding:20px;}
.presenter .callout{font-size:16px;padding:14px 18px;}
.presenter .tbl th,.presenter .tbl td{font-size:14px;padding:10px 12px;}
.presenter .opt{font-size:16px;padding:12px 16px;}
.presenter .qTitle{font-size:17px;}
.presenter .aiOutput{font-size:15px;}
.presenter .pill{font-size:14px;}
.presenter #btnPresenter{background:var(--gold);border-color:var(--gold);color:#5A4600;box-shadow:0 0 0 3px rgba(201,162,39,.35);}
.presenter .topbar::after{content:"📽 投影模式 ON";position:fixed;top:10px;right:18px;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.06em;pointer-events:none;z-index:30;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">NTU<br>IBS</div>
    <div class="brandText">
      <div class="course">IBS 2026 · International Business Strategy</div>
      <div class="topic">W10 · 平台 × 生態系競爭 <span class="teacherBadge" style="background:#1E40AF;color:#fff;">STUDENT 學生版</span></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="btnLang">EN / 中</button>
    <button class="btn" id="btnPresenter">投影模式</button>
    <button class="btn" id="btnReset">↺ Reset</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="navTitle">W10 Segments</div>
    <button class="navItem seg-s0" data-view="s0">🎬 S0 · 開場：劇情 + 核心問題 · 8 min</button>
    <button class="navItem seg-t1" data-view="t1">🏛️ T1 · Van Alstyne 2016：Pipeline → Platform · 20 min <span style="font-size:9px;color:var(--gold);">🤖</span></button>
    <button class="navItem seg-t2" data-view="t2">⚡ T2 · Jacobides 2024：外部性 × 互補性 · 15 min <span style="font-size:9px;color:var(--gold);">🤖</span></button>
    <button class="navItem seg-c1" data-view="c1">🚜 C1 · 案例整合：Komatsu vs Caterpillar × 佃製作所 · 12 min <span style="font-size:9px;color:var(--gold);">🤖</span></button>
    <button class="navItem seg-s1" data-view="s1">📝 S1 · 策略備忘錄 · 5 min</button>
    <div class="navFooter">
      <div class="hint">⬅ ➡ 切換段落<br/><span class="kbd">L</span> 語言 <span class="kbd">P</span> 投影 <span class="kbd">R</span> 重置<br/><br/>🤖 = AI 互動觸點</div>
    </div>
  </nav>
  <main class="content" id="content"></main>
</div>
<div id="toast"></div>

<script>
const STORE="ibs_w10_2026_student";
const IS_TEACHER=false;
const VIEW_ORDER = ["s0","t1","t2","c1","s1"];
const DEF = {lang:"zh",presenter:false,view:"s0",polls:{},quizDone:{},reveals:{}};
let ST = load();
const content = document.getElementById("content");
const toast = document.getElementById("toast");
function load(){try{const s=localStorage.getItem(STORE);return s?{...DEF,...JSON.parse(s)}:{...DEF};}catch(e){return{...DEF};}}
function save(){try{localStorage.setItem(STORE,JSON.stringify(ST));}catch(e){}}
function showToast(m){toast.textContent=m;toast.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove("show"),2200);}
function countWords(text){if(!text||!text.trim())return 0;const s=text.trim();const cjk=(s.match(/[一-鿿㐀-䶿豈-﫿]/g)||[]).length;const latin=s.replace(/[一-鿿㐀-䶿豈-﫿]/g," ").trim();const lw=latin?latin.split(/\s+/).filter(Boolean).length:0;return cjk+lw;}

function getPoll(k){return ST.polls[k]||{a:0,b:0,c:0,d:0,choice:null};}
function vote(k,ch){const p=getPoll(k);if(p.choice)p[p.choice]=Math.max(0,(p[p.choice]||0)-1);p.choice=ch;p[ch]=(p[ch]||0)+1;ST.polls[k]=p;save();}
function tot(p){return(p.a||0)+(p.b||0)+(p.c||0)+(p.d||0);}
function pct(p,k){const t=tot(p);return t?Math.round((p[k]||0)/t*100):0;}

function pollCard({key,title,title_en,opts,followup,followup_en}){
  const p=getPoll(key);const t=tot(p);const zh=ST.lang==="zh";
  return `<div class="qBox">
    <p class="qTitle">📊 ${zh?title:title_en}</p>
    <div class="options">
      ${opts.map(([k,lz,le])=>`<button class="opt${p.choice===k?' chosen':''}" data-poll="${key}" data-opt="${k}">${k.toUpperCase()}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${t>0?`<div style="margin-top:10px;display:grid;gap:4px;">
      ${opts.map(([k,lz,le])=>`<div style="display:flex;align-items:center;gap:6px;">
        <span style="width:30px;font-weight:900;font-family:var(--mono);font-size:12px;">${pct(p,k)}%</span>
        <div class="bar"><div class="fill" style="width:${pct(p,k)}%"></div></div>
        <span style="font-size:12px;color:var(--muted)">${k.toUpperCase()}. ${zh?lz:le}</span>
      </div>`).join("")}
      <div class="barWrap"><span class="smallVote">${t} 票</span></div>
    </div>`:""}
    ${(zh?followup:followup_en)?`<hr class="sep"/><p class="sm" style="font-weight:800;">💬 討論追問</p><ul class="ul" style="font-size:13px;margin-top:0;color:var(--muted);">${(zh?followup:followup_en).map(q=>`<li>${q}</li>`).join("")}</ul>`:""}
  </div>`;
}

function quizCard({key,q,q_en,opts,ans,exp,exp_en}){
  const zh=ST.lang==="zh";const done=ST.quizDone[key];
  return `<div class="qBox">
    <p class="qTitle">🧠 ${zh?q:q_en}</p>
    <div class="options">
      ${opts.map(([lz,le],i)=>`<button class="opt${done===i+1?(i===ans?' correct':' wrong'):''}" data-quiz="${key}" data-idx="${i}" ${done?'disabled':''}>${String.fromCharCode(65+i)}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${done?`<div class="callout ${done-1===ans?'green':'red'}" style="margin-top:10px;">
      <p class="p" style="font-size:13px;">${done-1===ans?"✅":"❌"} ${zh?exp:exp_en}</p>
    </div>`:""}
  </div>`;
}

function timeTags(cur){
  const segs=[["s0","🎬 S0","8min"],["t1","🏛️ T1 Van Alstyne","20min"],["t2","⚡ T2 Jacobides","15min"],["c1","🚜 C1 案例","12min"],["s1","📝 S1 Memo","5min"]];
  return `<div class="timeTracker">${segs.map(([k,l,t])=>`<span class="timePill ${k} ${k===cur?'cur':''}" style="${k===cur?'':'opacity:.5'}">${l} ${t}</span>`).join("")}</div>`;
}

function revealBtn(id,label="💡 教師提示"){

function copyPromptText(elementId, btn){
  const el=document.getElementById(elementId);
  if(!el) return;
  const text=el.textContent;
  const finishOk=()=>{
    if(!btn) return;
    const orig=btn.innerHTML;
    btn.innerHTML="✓ "+(ST.lang==="zh"?"已複製！":"Copied!");
    btn.classList.add("copied");
    setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove("copied");},2000);
  };
  const fallback=()=>{
    const ta=document.createElement("textarea");
    ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");finishOk();}
    catch(e){alert((ST.lang==="zh"?"複製失敗，請手動選取文字。":"Copy failed, please select text manually.")+"\n"+e.message);}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(finishOk).catch(fallback);
  }else{
    fallback();
  }
}

    <p class="p"><strong>${zh?"🔑 Puzzle 解答（Van Alstyne 的核心論點）：":"🔑 Puzzle Resolution (Van Alstyne's Core Argument):"}</strong> ${zh?
    "Van Alstyne, Parker, &amp; Choudary (2016, HBR) 主張：<strong>平台（Platform）</strong>不是某種特定產業的現象，而是一種<strong>商業邏輯的根本轉移</strong>。Pipeline 的邏輯是線性價值鏈（設計 → 製造 → 銷售）；Platform 的邏輯是<strong>促成生產者（producer）與消費者（consumer）之間的價值交換</strong>，並透過<strong>網路效應</strong>放大價值。在這個轉移下，<em>三條策略規則必須改寫</em>。<br/><strong>用這個觀點看 Komatsu</strong>：2% 滲透率不是失敗指標──它是 NE 飛輪剛點火的位置。Komatsu 投 $1.6B 是在<em>補貼一邊以引爆另一邊</em>，這只有在 Platform 邏輯下才合理。" :
    "Van Alstyne, Parker, &amp; Choudary (2016, HBR) argue: a <strong>Platform</strong> is not an industry phenomenon — it is a <strong>fundamental shift in business logic</strong>. Pipeline logic is a linear value chain (design → make → sell); Platform logic <strong>facilitates value exchange between producers and consumers</strong>, amplified by <strong>network effects</strong>. Under this shift, <em>three strategic rules must be rewritten</em>.<br/><strong>Through this lens, Komatsu becomes legible</strong>: 2% penetration is not a failure metric — it's the moment the NE flywheel just lit. The $1.6B is <em>subsidizing one side to ignite the other</em>, which only makes sense under Platform logic."}</p>

      <p class="p" style="font-size:13px;line-height:1.65;margin:0;">${zh?"<strong>🎯 觀察重點</strong>：Pipeline 上的<em>五個中間環節</em>（經紀、出版社、印刷廠、經銷商、零售商）在 Platform 模式中<strong>全部被平台內化或消滅</strong>──Amazon Kindle Direct Publishing（KDP）讓作者直接上傳；Amazon Print-on-Demand 取代印刷廠；Amazon 網站取代經銷商與零售商。這就是『從線性到環形』的根本含義──不是優化既有環節，而是<strong>結構性吸收中介</strong>，讓供給端與需求端直接互動。":"<strong>🎯 Key observation</strong>: the <em>five intermediary stages</em> on the pipeline (Agent, Publisher, Printing, Dealers, Retailers) are <strong>absorbed or eliminated</strong> in the platform mode — Amazon Kindle Direct Publishing (KDP) lets authors upload directly; Amazon Print-on-Demand replaces printers; the Amazon site replaces dealers and retailers. This is what 'linear → circular' really means — not optimizing existing stages, but <strong>structurally absorbing intermediaries</strong> so the supply side and demand side interact directly."}</p>

    <p class="p" style="font-size:12.5px;line-height:1.65;color:#475569;margin-top:10px;">${zh?"<strong>🚜 對應 Komatsu 案例</strong>：KSC / LANDLOG 同樣把『測量公司 → 設計顧問 → 規劃顧問 → 施工承包商 → 檢驗公司』的線性流程<em>環形化</em>──全部接到平台上，承包商可直接呼叫所有環節，不必逐家發包。":"<strong>🚜 Komatsu mapping</strong>: KSC / LANDLOG similarly <em>circularizes</em> the linear flow of &quot;survey firm → design consultant → planning consultant → construction contractor → inspection firm&quot; — all are plugged into the platform; contractors can summon every stage directly without sequential subcontracting."}</p>

    ${IS_TEACHER?revealSection("viz_publishing",`
      <ul class="ul" style="font-size:13px;margin-top:0;line-height:1.7;">

        <li><strong>常見學生誤解</strong>：『環形』被當成視覺修辭，以為只要『畫成圓的』就是平台。糾正：關鍵不在形狀，而在<em>中介內化</em>──如果 Amazon 仍要透過獨立經銷商出貨、透過獨立印刷廠印書、透過第三方零售網站賣書，那即使中央有個『平台核心』，本質仍是 Pipeline。</li>

      <p class="p" style="font-size:13px;line-height:1.65;margin:0;">${zh?"<strong>🎯 關鍵對照</strong>：出版業的<em>五個中間商</em>在 Amazon 平台中被吸收；Komatsu 工地的<em>五大服務環節</em>（測量→設計→規劃→施工→檢驗）在 LANDLOG 中被平台化。兩個案例的結構邏輯完全相同──<strong>中介被內化，供給端（Komatsu ICT 承包商）與需求端（互補商）直接在平台上互動</strong>。Komatsu 不再說再見於推土機，而是說你好於整個工地的資料流。":"<strong>🎯 Key parallel</strong>: just as Amazon's platform absorbed publishing's five intermediary stages, Komatsu's LANDLOG platform integrates construction's five service stages (survey→design→plan→construct→inspect). The structural logic is identical — <strong>intermediaries are absorbed; the supply side (contractor + Komatsu ICT) and demand side (complementors) interact directly on the platform</strong>. Komatsu no longer says goodbye at machine delivery; it says hello to the entire jobsite data stream."}</p>

  <div class="callout gold" style="margin-bottom:14px;">
    <p class="p" style="font-size:13.5px;"><strong>🚜 ${zh?"主軸案例補述：Komatsu Smart Construction 三個階段（配合上圖）":"Anchor Case Recap: Komatsu Smart Construction Three Stages (see diagram above)"}</strong><br/>
    ${zh?"<strong>Komatsu 的 Pipeline 階段（1921-2014）= MONO 文化</strong>：賣推土機、挖土機等資本財，靠製造品質贏 Caterpillar。一次性銷售 + 售後服務 + 維修零件，<em>商品出廠那一刻價值就確定</em>。Komatsu 自稱「<em>產品出去就跟客戶說再見</em>」。<br/>" +
    "<strong>過渡期（2013-2015）= ICT 機器階段</strong>：大橋徹二社長在 2013 年推出『智慧連網（ICT）』推土機與挖土機──能用 GPS 自動下挖到指定深度。但這仍是<em>單機自動化</em>，不是平台──設備仍是賣給承包商一次性使用，沒有改變『一次性銷售 + 售後維修』的商業邏輯。<br/>" +
    "<strong>Smart Construction 階段（2015 起）= KOTO 文化 / Platform 邏輯</strong>：把『工作』從『移土』重新定義為『完成整個工地』──測量（無人機）→ 設計（3D）→ 規劃（最佳化路徑）→ 施工（ICT 機器）→ 檢驗（熱圖比對）的一條鏈，全部接到 KomConnect / LANDLOG 平台上。商業邏輯從<em>一次性賣硬體</em>變成<em>訂閱平台 + ICT 機器租賃 + 數據服務</em>。" :
    "<strong>Pipeline phase (1921-2014) = MONO culture</strong>: Komatsu sells bulldozers and excavators as capital goods, beating Caterpillar on manufacturing quality. One-time sale + after-service + spare parts; <em>value is fixed the moment the product ships</em>. Komatsu insiders described this as &quot;<em>once the product is delivered, we say goodbye to the customer</em>.&quot;<br/>" +
    "<strong>Transition (2013-2015) = ICT machine phase</strong>: President Ohashi rolled out intelligent Connected Technology (ICT) machines in 2013 — excavators that could auto-dig to a programmed depth via GPS. But this is still <em>single-machine automation</em>, not a platform — analogous to making a stand-alone product better without changing business logic.<br/>" +
    "<strong>Smart Construction phase (from 2015) = KOTO culture / Platform logic</strong>: re-frames the &quot;job&quot; from &quot;moving dirt&quot; to &quot;completing the entire jobsite&quot; — Survey (drones) → Design (3D) → Plan (route optimization) → Construct (ICT machines) → Inspect (heatmap diff), all linked through the KomConnect / LANDLOG platform. Business logic shifts from <em>one-time hardware sale</em> to <em>platform subscription + ICT-machine rental + data service</em>."}</p>
  </div>

  <hr class="sep"/>
  <p class="cardTitle">📐 ${zh?"三大新規則（Three New Rules）":"Three New Rules"}</p>
  <div class="grid3" style="margin-bottom:16px;">
    <div class="card" style="border-top:3px solid var(--t1);">
      <p class="cardTitle" style="color:var(--t1);font-size:14px;">① ${zh?"資源控制 → 資源編排":"Resource Control → Resource Orchestration"}</p>
      <p class="p" style="font-size:13px;line-height:1.65;">${zh?"Pipeline 邏輯：擁有資源（廠房、原料、員工）才能控制。<strong>Platform 邏輯：編排他人擁有的資源</strong>，特別是社群與生態。Uber 不擁有車，Airbnb 不擁有房。":"Pipeline: own resources (plants, materials, staff) to control them. <strong>Platform: orchestrate resources others own</strong> — community and ecosystem above all. Uber owns no cars; Airbnb owns no rooms."}</p>
      <p class="p" style="font-size:12px;color:var(--ai);font-weight:700;margin:6px 0 0;">${zh?"⚠️ 危險訊號：把『編排』誤解為『外包』──外包是把任務包給別人；編排是<em>動態地</em>促成多方互動並從中抽取價值（match-making）。":"⚠️ Danger sign: confusing 'orchestration' with 'outsourcing'. Outsourcing hands a task to someone else; orchestration <em>dynamically</em> facilitates multi-party interaction and extracts value (match-making)."}</p>
    </div>
    <div class="card" style="border-top:3px solid var(--t2);">
      <p class="cardTitle" style="color:var(--t2);font-size:14px;">② ${zh?"內部最佳化 → 外部互動":"Internal Optimization → External Interaction"}</p>
      <p class="p" style="font-size:13px;line-height:1.65;">${zh?"Pipeline 邏輯：優化內部流程（精實生產、TQM）。<strong>Platform 邏輯：優化外部互動（producer-consumer 之間每一次配對的成功率與品質）。</strong>關鍵 KPI 變成：互動失敗率（interaction failure rate）、配對品質、負面網路效應的吸收。":"Pipeline: optimize internal processes (lean, TQM). <strong>Platform: optimize external interactions (success rate and quality of every producer-consumer match).</strong> Key KPIs become: interaction failure rate, match quality, absorption of negative network effects."}</p>
      <p class="p" style="font-size:12px;color:var(--ai);font-weight:700;margin:6px 0 0;">${zh?"⚠️ 危險訊號：以『毛利率』作為平台主要 KPI──Van Alstyne 強調平台應追蹤『互動指標』，毛利率是 Pipeline 思維的殘留。":"⚠️ Danger sign: using 'gross margin' as the platform's primary KPI — Van Alstyne stresses platforms should track 'interaction metrics'; margin is a residue of pipeline thinking."}</p>
    </div>
    <div class="card" style="border-top:3px solid var(--c1);">
      <p class="cardTitle" style="color:var(--c1);font-size:14px;">③ ${zh?"客戶價值 → 生態系價值":"Customer Value → Ecosystem Value"}</p>
      <p class="p" style="font-size:13px;line-height:1.65;">${zh?"Pipeline 邏輯：最大化單一客戶的終身價值（LTV）。<strong>Platform 邏輯：最大化整個生態系的總價值</strong>──有時必須補貼某一邊（如 Komatsu 提供 ATOS 折扣 ICT 設備、放低 LANDLOG 訂閱門檻）以引爆另一邊（互補商：測量、檢驗、調度等）的價值。":"Pipeline: maximize single customer lifetime value (LTV). <strong>Platform: maximize total ecosystem value</strong> — sometimes subsidize one side (e.g., Komatsu offers ATOS discounted ICT rentals and keeps LANDLOG subscription thresholds low) to ignite value on the other side (complementors: surveyors, inspectors, dispatchers)."}</p>
      <p class="p" style="font-size:12px;color:var(--ai);font-weight:700;margin:6px 0 0;">${zh?"⚠️ 危險訊號：把『生態系價值』講成『所有人都受益』──錯。生態系價值最大化常意味著<em>誰補貼誰、誰被擠出</em>的明確選擇。":"⚠️ Danger sign: framing 'ecosystem value' as 'everyone benefits'. Wrong. Ecosystem-value maximization usually involves explicit choices about <em>who subsidizes whom, who is squeezed out</em>."}</p>
    </div>

    <p class="p" style="font-size:13px;line-height:1.65;margin:0 0 10px;">${zh?"<strong>核心問題</strong>：Uber 全球市值千億美元、號稱有強大網路效應──但它的全球擴張為什麼一再失敗？單純『有 NE』不足以保證跨國成功；關鍵是這個 NE 是<em>限於單一國家／城市內</em>（within-country only），還是<em>能跨越國境</em>（cross-country）。前者是『多國拼貼』，後者才是『真正的全球平台』。":"<strong>Core question</strong>: Uber is worth nine figures and is loudly claimed to have strong network effects — yet its global expansion has repeatedly failed. Why? Having 'NE' is not enough for cross-border success. The decisive question is whether the NE is <em>within-country / within-city only</em> or <em>truly cross-country</em>. The former is a patchwork of national platforms; only the latter is a genuinely global platform."}</p>

    <p class="p" style="font-size:12.5px;line-height:1.65;color:#475569;margin-top:10px;">${zh?"<strong>📐 與 Jacobides (2024) 的關係</strong>：Jacobides 的四象限（同邊／跨邊 × 正／負）是『<em>單一國家內</em>的 NE 結構』；Stallkamp & Schotter 的二分（within-country / cross-country）是『<em>NE 能否跨越國境</em>』──兩者<em>正交</em>，可疊加。Komatsu LANDLOG 同時面對兩個診斷：對內是『跨邊正向 NE 是否點火』（Q2），對外是『NE 能否跨境』（within-country 偏多）。前者決定『要不要做平台』；後者決定『跨國時用什麼進入模式』。":"<strong>📐 Relation to Jacobides (2024)</strong>: Jacobides's 4-quadrant (same-/cross-side × pos/neg) is about NE <em>structure within a single country</em>; Stallkamp & Schotter's binary (within- vs cross-country) is about <em>whether NE crosses borders</em> — the two are <em>orthogonal</em> and can be layered. LANDLOG faces both diagnostics: internally, &quot;has Q2 cross-side positive NE ignited?&quot;; externally, &quot;does NE cross borders?&quot; (mostly within-country). The former decides whether to platform-ify; the latter decides which entry mode to use abroad."}</p>

      <li><strong>Komatsu 類比</strong>：Tsukuda 不應追求成為 LANDLOG 級的『主機平台』──那需要 Komatsu+NTT DOCOMO+OPTiM+SAP 級的資源整合。應參考 <em>ATOS</em>（Komatsu 案例中的早期採用 SME，從 4 人成長到 50 人 FTE）：成為某個平台的『關鍵示範客戶 + 唯一精通某類施工的中小企業』，藉平台規模引爆自身成長，但保留獨立性與選擇權，成為平台領導者願意持續扶植（甚至日後可能高估值併購）的對象。</li>
    </ul>
  `):""}

  ${pollCard({key:"c1_strategy",title:"整合分析後：你建議佃製作所採取哪種策略？",title_en:"After integration: which strategy do you recommend?",opts:[["a","建立自家拖拉機平台，挑戰 Darwin","Build own tractor platform, challenge Darwin"],["b","聚焦水田用變速箱，建立獨特互補瓶頸","Focus on paddy-field transmission, become unique-complement bottleneck"],["c","加入 Darwin 但保留 IP 與選擇性退出條款","Join Darwin but retain IP and selective exit clauses"],["d","維持帝國重工關係，做高品質 Pipeline","Stay with Teikoku, run a high-quality pipeline"]],followup:["選 B 的人：要如何避免 Darwin 透過 M&A 吞併你？","選 C 的人：你的退出條款如何保護你不被 envelop？"],followup_en:["Team B: How do you avoid Darwin enveloping you via M&A?","Team C: How do exit clauses protect from envelopment?"]})}`;
}

    "Tsukuda faces a core strategic choice in the rising Darwin Project SME-coalition ecosystem: strive to be a <strong>Platform Leader</strong> or position as a <strong>Niche Provider</strong>? Write a memo: (1) Diagnose Darwin and Tsukuda's current positions using Van Alstyne (2016)'s Pipeline → Platform frame; (2) Analyze Tsukuda's most likely competitive advantage via Jacobides (2024)'s unique complementarity; (3) Anticipate medium-term dynamics — including envelopment or M&A — using van Angeren (2025)'s bottleneck lens; (4) Make concrete recommendations and articulate the SME platform-war trade-off. (180-220 words)"}</p>

    <div class="tbl" style="margin-bottom:10px;">
      <table class="tbl" style="font-size:13px;">
        <thead><tr><th>${zh?"層次":"Layer"}</th><th>${zh?"問題":"Question"}</th><th>${zh?"關鍵概念":"Key Concept"}</th></tr></thead>
        <tbody>
          <tr><td><strong>${zh?"診斷":"Diagnose"}</strong></td><td>${zh?"Darwin 是真平台還是聯盟？佃在生態系裡的位置？":"Is Darwin a true platform or just a coalition? Tsukuda's position?"}</td><td>${zh?"Pipeline vs Platform · 三大規則":"Pipeline vs Platform · 3 New Rules"}</td></tr>
          <tr><td><strong>${zh?"優勢分析":"Advantage"}</strong></td><td>${zh?"佃的獨特互補性為何？":"Tsukuda's unique complementarity?"}</td><td>${zh?"Jacobides · Generic vs Unique":"Jacobides · Generic vs Unique"}</td></tr>
          <tr><td><strong>${zh?"風險預判":"Anticipate"}</strong></td><td>${zh?"被吞併、tipping、瓶頸？":"Envelopment, tipping, bottleneck?"}</td><td>${zh?"van Angeren · M&A · 監管":"van Angeren · M&A · regulation"}</td></tr>
          <tr><td><strong>${zh?"建議與權衡":"Recommend"}</strong></td><td>${zh?"Platform Leader vs Niche Provider？":"Platform Leader vs Niche Provider?"}</td><td>${zh?"SME 的資源限制 · 治理選擇":"SME resource constraint · governance choice"}</td></tr>
        </tbody>
      </table>
    </div>
    <textarea id="memoText" class="critiqueInput" rows="9" placeholder="${zh?'TO: 佃製作所經營團隊\nFROM: 策略顧問\nSUBJECT: Darwin 平台戰中的定位建議\n\n診斷：...\n優勢：...\n風險：...\n建議：...':'TO: Tsukuda Management\nFROM: Strategy Consultant\nSUBJECT: Positioning Recommendation in the Darwin Platform War\n\nDiagnose: ...\nAdvantage: ...\nAnticipate: ...\nRecommend: ...'}" oninput="updateWC('memoText','memoWC')"></textarea>
    <div id="memoWC" class="wc">0 字 / Words</div>
  </div>

  ${IS_TEACHER?revealBtn("s1_close","📋 TEACHER NOTE — Memo 評分指引（點擊展開）"):""}
  ${IS_TEACHER?revealSection("s1_close",`
    <div class="tbl" style="margin-top:8px;">
      <table class="tbl" style="font-size:12px;">
        <thead><tr><th>${zh?"評分標準":"Criterion"}</th><th>${zh?"優秀（A）":"A"}</th><th>${zh?"普通（B/C）":"B/C"}</th><th>${zh?"需改進":"Needs work"}</th></tr></thead>
        <tbody>
          <tr><td><strong>${zh?"理論整合":"Theory Integration"}</strong></td><td>${zh?"明確使用 Van Alstyne 三規則 + Jacobides 互補性 + van Angeren 瓶頸論":"Uses Van Alstyne's 3 rules + Jacobides complementarity + van Angeren bottleneck"}</td><td>${zh?"提到三篇但連結粗糙":"Mentions all three but loose connection"}</td><td>${zh?"只用一篇或概念混用":"Only one paper or conflated concepts"}</td></tr>
          <tr><td><strong>${zh?"診斷精度":"Diagnostic Precision"}</strong></td><td>${zh?"精確區分 Darwin 是『聯盟』而非『平台』；解釋為什麼":"Precisely distinguishes Darwin as 'coalition' not 'platform'; explains why"}</td><td>${zh?"模糊承認兩者差別":"Vaguely acknowledges difference"}</td><td>${zh?"把 Darwin 當作真平台":"Treats Darwin as a real platform"}</td></tr>
          <tr><td><strong>${zh?"SME 真實性":"SME Realism"}</strong></td><td>${zh?"承認 SME 自建 NE 不可行；建議走獨特互補路徑":"Acknowledges self-built NE infeasible for SME; recommends unique-complement path"}</td><td>${zh?"考慮資源限制但建議仍偏野心":"Notes constraints but recommendation still over-ambitious"}</td><td>${zh?"不切實際的『Tsukuda 變平台霸主』敘事":"Unrealistic 'Tsukuda becomes platform king' narrative"}</td></tr>
          <tr><td><strong>${zh?"動態預判":"Dynamic Foresight"}</strong></td><td>${zh?"預判被吞併／併購／監管干預，並提應對":"Anticipates envelopment / M&A / regulatory intervention, with responses"}</td><td>${zh?"提及但無應對策略":"Mentions but no response strategy"}</td><td>${zh?"靜態分析，無動態觀點":"Static analysis only"}</td></tr>
        </tbody>
      </table>
    </div>
    <p style="font-size:13px;margin-top:8px;"><strong>優秀答案的核心論點</strong>：Darwin 是<em>包裝為平台的傳統聯盟</em>──缺乏雙邊互動、無真正網路效應，更像 Pipeline 聯軍。Tsukuda 在 NE 賽道上不可能擊敗 Darwin（資源限制），但能在『水田用精密變速箱』建立<em>獨特互補性</em>，成為 van Angeren 意義下的<em>關鍵瓶頸</em>。建議：採『Niche-with-Optionality』──聚焦水田高精度、保留選擇性開放介面、刻意維持 Darwin 與帝國重工的同時相依，避免 lock-in 任一方；中長期視機會接受 M&A 議價（類比 Komatsu 案例中 ATOS 受 Komatsu 扶植的關係：被視為關鍵 SME 而非可替換零件），確保 SME 的<em>價值最大化退出</em>而非被吞併消滅。</p>
  `):""}`;
}

function render(){
  const v=ST.view;
  let html="";
  if(v==="s0") html=viewS0();
  else if(v==="t1") html=viewT1();
  else if(v==="t2") html=viewT2();
  else if(v==="c1") html=viewC1();
  else if(v==="s1") html=viewS1();
  content.innerHTML=html;
  bindEvents();
  restoreRevealStates();
  ["memoText","ai1Critique","ai2Critique","ai3Critique","debateInput","ai1Response","ai2Response","ai3Response"].forEach(id=>{
    const el=document.getElementById(id);
    if(el&&ST[id])el.value=ST[id];
  });
  window.scrollTo({top:0,behavior:"smooth"});
}

function bindEvents(){
  document.querySelectorAll(".navItem").forEach(b=>{
    b.classList.toggle("active",b.dataset.view===ST.view);
    b.onclick=()=>{ST.view=b.dataset.view;save();render();};
  });
  document.querySelectorAll(".opt[data-poll]").forEach(b=>{
    b.onclick=()=>{vote(b.dataset.poll,b.dataset.opt);render();};
  });
  document.querySelectorAll(".opt[data-quiz]").forEach(b=>{
    b.onclick=()=>{
      const k=b.dataset.quiz;const i=parseInt(b.dataset.idx);
      if(!ST.quizDone[k]){ST.quizDone[k]=i+1;save();render();}
    };
  });
  document.getElementById("btnLang")?.addEventListener("click",()=>{ST.lang=ST.lang==="zh"?"en":"zh";save();render();});
  document.getElementById("btnPresenter")?.addEventListener("click",()=>{document.body.classList.toggle("presenter");});
  document.getElementById("btnReset")?.addEventListener("click",()=>{if(confirm("Reset all progress?")){{localStorage.removeItem(STORE);ST={...DEF};render();}}});
  ["memoText","ai1Critique","ai2Critique","ai3Critique","debateInput","ai1Response","ai2Response","ai3Response"].forEach(id=>{
    const el=document.getElementById(id);
    const wcId=id==="memoText"?"memoWC":id.replace("Critique","WC").replace("Input","WC");
    if(el){
      updateWC(id,wcId);
      el.addEventListener("input",()=>{ST[id]=el.value;save();updateWC(id,wcId);});
    }
  });
}

function updateWC(inputId,wcId){
  const el=document.getElementById(inputId);
  const wc=document.getElementById(wcId);
  if(!el||!wc)return;
  const n=countWords(el.value);
  const targets={memoText:200,ai1Critique:120,ai2Critique:120,ai3Critique:150,debateInput:120,ai1Response:100,ai2Response:100,ai3Response:100};
  const t=targets[inputId]||150;
  wc.textContent=`${n} 字 / ${t} 目標`;
  wc.style.color=n>=t?"#15803d":n>t*0.5?"#B45309":"var(--muted)";
}

function restoreRevealStates(){
  if(!ST.reveals)return;
  Object.keys(ST.reveals).forEach(id=>{
    const el=document.getElementById(id+"Rev");
    if(el&&ST.reveals[id])el.classList.add("visible");
  });
}

document.addEventListener("keydown",e=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT") return;
  const i=VIEW_ORDER.indexOf(ST.view);
  if(e.key==="ArrowRight"||e.key==="]") {if(i<VIEW_ORDER.length-1){ST.view=VIEW_ORDER[i+1];save();render();}}
  if(e.key==="ArrowLeft"||e.key==="[") {if(i>0){ST.view=VIEW_ORDER[i-1];save();render();}}
  if(e.key==="l"||e.key==="L"){ST.lang=ST.lang==="zh"?"en":"zh";save();render();}
  if(e.key==="p"||e.key==="P"){document.body.classList.toggle("presenter");}
  if(e.key==="r"||e.key==="R"){if(confirm("Reset?")){{localStorage.removeItem(STORE);ST={...DEF};render();}}}
});

render();
</script>
</body>
</html>
